name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Fast feedback: the test is a plain Ruby program, so run the snapshot
  # transcript under CRuby and diff it against the committed expectation.
  cruby:
    name: Snapshot test (CRuby)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: .ruby-version
      - name: Diff transcript against snapshot
        run: ruby test/cli_test.rb | diff -u test/cli_test.rb.expected -

  # Full check: compile the CLI and the test with Spinel, run `spin test`, then
  # build the native binary and exercise it directly over a fixture repo so the
  # actual shipped artifact is validated at run time. Spinel is built from
  # source (it is not packaged), mirroring the SessionStart hook.
  spinel:
    name: Compiled test (Spinel)
    runs-on: ubuntu-latest
    env:
      # Keep this in sync with SPINEL_REF in .claude/hooks/session-start.sh.
      SPINEL_REF: 0b8527df4b8721b68a87c508345a040279f4ef89
      SPINEL_REPO: https://github.com/matz/spinel.git
      SPINEL_PREFIX: ${{ github.workspace }}/.spinel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: .ruby-version

      # `spin` is self-contained under SPINEL_PREFIX after `make install`,
      # so caching that directory lets us skip the rebuild on later runs.
      - name: Cache Spinel install
        id: cache-spinel
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.SPINEL_PREFIX }}
          key: spinel-${{ runner.os }}-${{ env.SPINEL_REF }}

      - name: Build & install Spinel
        if: steps.cache-spinel.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          src="$RUNNER_TEMP/spinel-src"
          git init -q "$src"
          git -C "$src" remote add origin "$SPINEL_REPO"
          git -C "$src" fetch -q --depth 1 origin "$SPINEL_REF"
          git -C "$src" checkout -q FETCH_HEAD
          make -C "$src" deps
          make -C "$src"
          make -C "$src" install PREFIX="$SPINEL_PREFIX"

      - name: Run spin test
        run: |
          echo "$SPINEL_PREFIX/bin" >> "$GITHUB_PATH"
          export PATH="$SPINEL_PREFIX/bin:$PATH"
          spin --version
          spin test

      # Type-health gate. `spinel-doctor` statically flags the exact class of
      # bug the fixture binary run and the golden RBS file were bolted on to
      # defend against: a method the Spinel runtime can't service on an
      # `untyped`/`unknown` receiver (Array#sort and its poly-array siblings --
      # uniq/select/reject/compact/flatten/take/zip/index/reduce/sort_by), which
      # compiles clean and passes `spin test` yet dies with NoMethodError only on
      # the shipped binary. doctor's `unresolved` leg reports those from a compile
      # pass, so it fires without a fixture having to happen to walk the hazardous
      # path. It exits non-zero on any error-severity finding (unresolved /
      # unsupported / build / behavior); `inference` widenings are info-only and
      # do NOT fail the step, so a merely-intended type shift stays silent here --
      # catching a *regression* to `untyped` remains the golden RBS check's job
      # below, which is why both still run. Point it at the CLI and the test:
      # `spin test` compiles the test with Spinel too, so it can carry the same
      # hazard.
      #
      # `spinel-doctor` is installed beside `spin` by `make install` at the
      # pinned SPINEL_REF (its Makefile installs TOOL_NAMES = doctor reduce
      # flatten), so it is already on PATH under $SPINEL_PREFIX/bin -- no extra
      # copy step needed. The guard turns a future ref that drops it into a loud
      # failure instead of a silently-skipped "command not found".
      - name: Type-health check (spinel-doctor)
        run: |
          command -v spinel-doctor >/dev/null || {
            echo "spinel-doctor not on PATH: the pinned Spinel build no longer ships it (see SPINEL_REF)" >&2
            exit 1
          }
          spinel-doctor bin/git-stack.rb
          spinel-doctor test/cli_test.rb

      # Runtime check on the *shipped* artifact. `spin test`'s harness shells
      # out to `ruby bin/git-stack.rb`, and the cruby job runs the script under
      # CRuby -- so neither ever executes the compiled binary. A method the
      # Spinel runtime does not support (e.g. Array#sort) compiles clean and
      # passes both snapshots, then dies with NoMethodError only on the real
      # binary. Build it and drive it over a fixture repo (trunk / nesting /
      # multiple siblings / an orphan), diffing the transcript against the
      # committed snapshot. Regenerate after an intentional change with:
      #
      #   spin build && test/binary_test.sh > test/binary_test.sh.expected
      #
      # `tree` runs against the multi-sibling stack on purpose: sibling
      # ordering is the only path that reaches the `.sort` calls in
      # StackContext#children_of / #walk_order, where an unsupported runtime
      # method would otherwise slip through unseen.
      - name: Run compiled binary against fixture
        run: |
          spin build
          test/binary_test.sh | diff -u test/binary_test.sh.expected -

      # Golden-file check on Spinel's inferred types: the snapshot is the
      # committed output of `spinel --emit-rbs --rbs rbs/ bin/git-stack.rb`. The
      # `--rbs rbs/` feeds the same hand-written seed `spin build` uses, so the
      # golden reflects the types the shipped binary is actually compiled with. A
      # diff here means a source change shifted inference -- an `untyped (slow
      # path)` line appearing is a type regression; anything else means refresh
      # the snapshot with:
      #
      # Kept even though spinel-doctor now runs above: doctor lists the same
      # widenings but only at *info* severity (it never fails on them), so a
      # regression to `untyped` that doctor's error legs don't independently flag
      # -- e.g. a poly array Spinel resolves without an `unresolved` warning --
      # would slip past doctor and is caught only by this golden diff. The two
      # are complementary; revisit retiring this file only if doctor grows an
      # error-severity signal for untyped widening.
      #
      #   spinel --emit-rbs --rbs rbs/ bin/git-stack.rb --output=test/git-stack.rbs.expected
      #
      # The emitted golden lives in test/ with the other .expected snapshot;
      # never move it under rbs/, the seed *input* directory, or it would seed
      # itself.
      - name: Check emitted RBS against golden file
        run: |
          spinel --emit-rbs --rbs rbs/ bin/git-stack.rb --output=/tmp/emitted.rbs
          diff -u test/git-stack.rbs.expected /tmp/emitted.rbs
